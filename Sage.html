<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageInstitute</title>
    <style>
        header {
            display: flex;
            flex-direction: column;
            align-items: center; /* Center horizontally */
            justify-content: center; /* Center vertically if needed */
            text-align: center; /* Ensure text is centered */
            padding: 20px; /* Optional: Add some spacing */
        }

        h1 {
            margin: 0; /* Remove default margin for better alignment */
            font-size: 2.5em; /* Optional: Adjust font size */
        }

        img.center {
            width: 200px; /* Match the inline width attribute */
            height: 100px; /* Match the inline height attribute */
            margin-top: 10px; /* Optional: Add spacing between h1 and image */
        }

        hr {
            width: 80%; /* Optional: Make the hr line not stretch full width */
            margin: 20px 0; /* Add spacing around the hr */
        }
    </style>
</head>
<body>
    <header>
        <h1>Sage Training Institute</h1>
        <img src="https://besu87.github.io/my-images/Sage.jpg" alt="SageInstitute" class="center">
        <hr>
    </header>
</body>
</html>
